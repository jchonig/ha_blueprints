name: Bump blueprint version

on:
  push:
    branches: [main]
    paths:
      - "automations/**.yaml"
      - "scripts/**.yaml"

permissions:
  contents: write

jobs:
  bump-version:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version lines and commit
        run: |
          mapfile -t files < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'automations/*.yaml' 'scripts/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No blueprint files changed."
            exit 0
          fi

          python3 .github/scripts/bump_blueprint_version.py "${files[@]}"

          if git diff --quiet -- "${files[@]}"; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- "${files[@]}"
          git commit -m "Bump blueprint version [skip ci]"
          git push
